name: watch-public-broadcast

on:
  workflow_dispatch:
  schedule:
    # Every 30 minutes. Offset from the top of the hour to reduce GitHub
    # schedule delays during high-load periods.
    - cron: "17,47 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: watch-public-broadcast
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      BOOKING_NUMBER: ${{ secrets.BOOKING_NUMBER }}
      FAMILY_NAME: ${{ secrets.FAMILY_NAME }}
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PUBLIC_BROADCAST: "1"
      TARGET_LOCATION: Botany
      STATUS_JSON_PATH: docs/status.json
      STATE_PATH: state/public_broadcast_state.json
      DEBUG_ARTIFACTS_PATH: artifacts/debug
      # Do not echo secrets in step output.
      ACTIONS_STEP_DEBUG: "false"

    steps:
      - name: Verify required secrets are present
        run: |
          missing=0
          if [ -z "${BOOKING_NUMBER}" ]; then
            echo "::error::BOOKING_NUMBER secret is not set"
            missing=1
          fi
          if [ -z "${FAMILY_NAME}" ]; then
            echo "::error::FAMILY_NAME secret is not set"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            npm install playwright
          fi

      - name: Install Playwright Chromium with system deps
        run: npx --yes playwright install --with-deps chromium

      - name: Run public broadcast watcher (single check)
        run: node watch_nsw_slots.js --once

      - name: Upload debug artifacts if watcher fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: watcher-debug
          path: artifacts/debug/
          if-no-files-found: ignore
          retention-days: 3

      - name: Commit updated status.json if changed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain docs/status.json)" ]; then
            git add docs/status.json
            git commit -m "update public slot status"
            git push
          else
            echo "No status changes to commit."
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
